apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iguanatrader.fullname" . }}-litestream-config
  labels:
    {{- include "iguanatrader.labels" . | nindent 4 }}
data:
  litestream.yml: |
    dbs:
      - path: {{ .Values.env.DATABASE_PATH | quote }}
        replicas:
          - type: s3
            bucket: {{ .Values.litestream.s3.bucket | quote }}
            path: iguanatrader.sqlite
            region: {{ .Values.litestream.s3.region | quote }}
            sync-interval: {{ .Values.litestream.syncInterval | quote }}
            {{- if .Values.litestream.s3.endpoint }}
            endpoint: {{ .Values.litestream.s3.endpoint | quote }}
            {{- end }}
