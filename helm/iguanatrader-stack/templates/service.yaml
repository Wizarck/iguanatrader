apiVersion: v1
kind: Service
metadata:
  name: {{ include "iguanatrader.fullname" . }}-api
  labels:
    {{- include "iguanatrader.labels" . | nindent 4 }}
    component: api
spec:
  type: {{ .Values.service.api.type }}
  selector:
    app.kubernetes.io/name: {{ include "iguanatrader.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: api
  ports:
    - name: http
      port: {{ .Values.service.api.port }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iguanatrader.fullname" . }}-openbb
  labels:
    {{- include "iguanatrader.labels" . | nindent 4 }}
    component: openbb-sidecar
spec:
  type: {{ .Values.service.openbb.type }}
  selector:
    app.kubernetes.io/name: {{ include "iguanatrader.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: openbb-sidecar
  ports:
    - name: http
      port: {{ .Values.service.openbb.port }}
      targetPort: http
