{{/*
Placeholder Secret manifest. In a Fleet-managed deploy this is REPLACED
by a SOPS-encrypted Secret applied via sops-secrets-operator (see
docs/runbooks/secret-rotation.md). This template renders an empty
Secret as a fail-safe so `helm template` outputs valid YAML even when
the operator hasn't applied the encrypted manifest yet.

DO NOT populate real secrets here. The chart's values.yaml only lists
the FIELD NAMES the api/openbb pods reference via envFrom.secretRef.
*/}}
{{- if not .Values.secret.skipPlaceholder }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "iguanatrader.labels" . | nindent 4 }}
  annotations:
    iguanatrader.io/managed-by-sops: "true"
    iguanatrader.io/note: "Replaced at deploy time by sops-secrets-operator. Empty placeholder for first-install."
type: Opaque
data: {}
{{- end }}
