# Fleet bundle config — drives target cluster matching for the
# openbb-sidecar chart. Mirrors the eligia-stack pattern.

defaultNamespace: iguanatrader

helm:
  releaseName: openbb-sidecar

targetCustomizations:
  - name: vps
    clusterSelector:
      matchExpressions:
        - key: management.cattle.io/cluster-display-name
          operator: In
          values:
            - iguanatrader-prod
            - local
    helm:
      valuesFiles:
        - values-vps.yaml

  - name: local-dev
    clusterSelector:
      matchExpressions:
        - key: management.cattle.io/cluster-display-name
          operator: In
          values:
            - iguanatrader-local
            - rancher-desktop
    helm:
      valuesFiles:
        - values-local.yaml
