# Production VPS overrides for openbb-sidecar.
#
# Applied via Fleet `targetCustomizations` in fleet.yaml when the
# downstream cluster matches the VPS selector. Solo-state production
# is the host k3s on the Hetzner CAX31; same chart can ship to any
# Rancher-managed downstream cluster.

image:
  pullPolicy: IfNotPresent
  # Pin a digest here when promoting to production for full reproducibility.
  # tag: "0.1.0"
  # digest: "sha256:..."

# Production log level: drop INFO chatter.
env:
  OPENBB_SIDECAR_LOG_LEVEL: "WARNING"

# Tighter readiness on production — initial pulls of openbb fundamentals
# can take 60-90s after pod start; readiness should reflect that.
readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 4
