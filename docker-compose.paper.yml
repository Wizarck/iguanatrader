# iguanatrader — paper-trading profile
#
# Standalone file (NOT a layered overlay). AGENTS.md §4 makes paper-vs-live
# a hard boundary; lexical separation in distinct files makes the boundary
# auditable in a single read.
#
# Per AGENTS.md §7 Override 1: paper-trading is the strongly-recommended
# default before live; this profile is what the operator runs as the
# real-money rehearsal.

x-litestream: &litestream-defaults
  image: litestream/litestream:latest
  restart: unless-stopped
  volumes:
    - ./data:/data
    - ./.litestream/litestream.yml:/etc/litestream.yml:ro

services:

  api:
    image: iguanatrader/api:paper
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: paper
    environment:
      - IGUANATRADER_PROFILE=paper
      - IBKR_HOST=${IBKR_HOST:-127.0.0.1}
      - IBKR_PORT=${IBKR_PORT_PAPER:-7497}
      - SOPS_AGE_KEY_FILE=/run/secrets/age_key
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./.secrets/paper.env.enc:/run/secrets/paper.env.enc:ro
    secrets:
      - age_key
    ports:
      - "8000:8000"
    depends_on:
      - litestream

  litestream:
    <<: *litestream-defaults
    command: ["replicate"]

secrets:
  age_key:
    file: ${SOPS_AGE_KEY_FILE_HOST:-~/.config/sops/age/keys.txt}
