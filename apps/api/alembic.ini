# Alembic config — see env.py for the runtime URL resolution (env var
# IGUANA_DATABASE_URL > sqlalchemy.url here > built-in default).

[alembic]
script_location = src/iguanatrader/migrations
prepend_sys_path = src
path_separator = os
version_path_separator = os

# Local development default. Production / paper / live environments override
# via IGUANA_DATABASE_URL (read by env.py).
sqlalchemy.url = sqlite+aiosqlite:///./data/iguanatrader.db

# Revision filename pattern: <rev>_<slug>.py (e.g. 0001_initial_schema.py).
# Slice 3 ships rev=0001; subsequent slices increment monotonically.
file_template = %%(rev)s_%%(slug)s

# Slug generation: only alphanumeric + underscore.
truncate_slug_length = 40

# Migration discovery roots. Empty here = use script_location only. Future
# slices that introduce per-context migration trees (none planned) would add
# version_locations entries.
# version_locations = %(here)s/src/iguanatrader/migrations/versions

[post_write_hooks]
# Optional: format generated migrations with black + ruff. Disabled by default
# (poetry not assumed in CI's alembic step). Pre-commit catches it.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%dT%H:%M:%S
