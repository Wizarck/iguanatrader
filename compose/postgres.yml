# iguanatrader — Postgres overlay (slice postgres-compose-overlay).
#
# Layers on top of `compose/mvp.yml` to swap the SQLite default
# for a managed Postgres 16 service. Designed for the VPS live-ready
# path: SQLite stays the default for local dev + test (faster, no
# docker dependency), Postgres is the canonical prod choice once a
# tenant carries real trade history.
#
# Bring-up (fresh VPS or fresh stack):
#
#   1. `docker compose -f compose/mvp.yml -f compose/mvp.override.yml \
#        -f compose/postgres.yml build`
#   2. `docker compose -f compose/mvp.yml -f compose/mvp.override.yml \
#        -f compose/postgres.yml up -d postgres`
#       # wait for healthcheck to go healthy (~5-10s on first boot)
#   3. `docker compose -f compose/mvp.yml -f compose/mvp.override.yml \
#        -f compose/postgres.yml run --rm api \
#        python -m alembic -c apps/api/alembic.ini upgrade head`
#   4. `docker compose -f compose/mvp.yml -f compose/mvp.override.yml \
#        -f compose/postgres.yml up -d`
#
# Cut-over from an existing SQLite deployment: see
# docs/runbooks/postgres-cutover.md.
#
# Default password is a non-functional placeholder. Production VPS
# overrides POSTGRES_PASSWORD via shell env / .env file before
# `docker compose up`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-iguanatrader}
      - POSTGRES_USER=${POSTGRES_USER:-iguanatrader}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-CHANGE-ME-POSTGRES-PASSWORD}
    volumes:
      - iguanatrader_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iguanatrader} -d ${POSTGRES_DB:-iguanatrader}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # No host port — Postgres only reachable inside the compose
    # network. Operator gets shell access via
    # `docker compose exec postgres psql ...`.

  api:
    environment:
      # Override the SQLite default from compose/mvp.yml. The
      # value uses the asyncpg driver (already in pyproject.toml).
      - IGUANA_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-iguanatrader}:${POSTGRES_PASSWORD:-CHANGE-ME-POSTGRES-PASSWORD}@postgres:5432/${POSTGRES_DB:-iguanatrader}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  iguanatrader_postgres_data:
