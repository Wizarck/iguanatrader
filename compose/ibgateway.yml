# iguanatrader — IB Gateway sidecar overlay (slice ibkr-gateway-sidecar +
# dual-daemon-mode-toggle-and-reconcile).
#
# Layers on top of `compose/mvp.yml` to add TWO IB Gateway
# services (paper + live) that the matching `trading_daemon_*`
# container connects to over the compose network. Each daemon owns its
# own gateway sidecar so a 2FA prompt on the live side does not stall
# the paper-side connection (and vice versa).
#
# Defaults map paper→port 4002 / VNC 5900 + live→port 4001 / VNC 5901
# matching the IBKR convention. The image is digest-pinned (audit-
# mitigation 2026-05-18; refresh quarterly per
# docs/runbooks/ibkr-gateway-bringup.md §Security).
#
# Bring-up (both gateways):
#
#   1. `docker compose -f compose/mvp.yml -f compose/mvp.override.yml \\
#        -f compose/postgres.yml -f compose/ibgateway.yml build`
#   2. Set required env (see `docs/runbooks/ibkr-gateway-bringup.md`):
#        export TWS_USERID=...                # paper
#        export TWS_PASSWORD=...
#        export TWS_USERID_LIVE=...           # live (populate when ready)
#        export TWS_PASSWORD_LIVE=...
#        export VNC_SERVER_PASSWORD_PAPER=$(python -c "import secrets; print(secrets.token_urlsafe(12))")
#        export VNC_SERVER_PASSWORD_LIVE=$(python -c "import secrets; print(secrets.token_urlsafe(12))")
#   3. `docker compose -f compose/mvp.yml -f compose/mvp.override.yml \\
#        -f compose/postgres.yml -f compose/ibgateway.yml up -d`
#
# The live daemon defaults to ``enabled=false`` (migration 0026 seed):
# the ib-gateway-live container boots + idles harmlessly until the
# operator toggles via the /settings UI. Once toggled, the daemon's
# bus subscriber runs reconcile + resumes signal generation.

x-ib-gateway-base: &ib-gateway-base
  # Pinned by digest (audit-mitigation 2026-05-18). Refresh quarterly:
  #   docker pull gnzsnz/ib-gateway:stable \
  #     && docker inspect --format '{{index .RepoDigests 0}}' gnzsnz/ib-gateway:stable
  # Audit verdict: SAFE — IbcAlpha/IBC bundled, MIT, 4+ years, no advisories.
  # See docs/runbooks/ibkr-gateway-bringup.md §Security.
  image: gnzsnz/ib-gateway:stable@sha256:a9a771b0d61ad8b57e0c7f9919b7d5396a1bbc4c3c576bb5f5848aa149d1ffaa
  restart: unless-stopped


services:
  ib-gateway-paper:
    <<: *ib-gateway-base
    environment:
      # gnzsnz wants TWS_USERID/TWS_PASSWORD, but the SOPS paper.env.enc
      # stores the same credential as IBKR_USERNAME/IBKR_PASSWORD — fall
      # back to those so `scripts/iguana-compose.sh paper up` logs in
      # without the operator having to remap the names by hand.
      - TWS_USERID=${TWS_USERID:-${IBKR_USERNAME:-}}
      - TWS_PASSWORD=${TWS_PASSWORD:-${IBKR_PASSWORD:-}}
      - TRADING_MODE=paper
      - EXISTING_SESSION_DETECTED_ACTION=${EXISTING_SESSION_DETECTED_ACTION:-primary}
      - READ_ONLY_API=${READ_ONLY_API_PAPER:-no}
      - VNC_SERVER_PASSWORD=${VNC_SERVER_PASSWORD_PAPER:-${VNC_SERVER_PASSWORD:-}}
      - TZ=${TZ:-UTC}
      - TWO_FA_TIMEOUT_ACTION=${TWO_FA_TIMEOUT_ACTION:-restart}
    # NO host port bind for 4002 — daemons reach it over compose-network
    # DNS as `ib-gateway-paper` on the socat-exposed port 4004 (the Java
    # API binds localhost:4002 only). VNC port localhost-only; SSH-tunnel
    # from operator host (port 5900 on host → 5900 on container).
    ports:
      - "127.0.0.1:5900:5900"
    # Probe the internal API socket (localhost:4002) with bash's /dev/tcp:
    # the gnzsnz image ships bash but NOT nc, so the old `nc -z` check
    # always failed and pinned the container UNHEALTHY (blocking the
    # daemon's `service_healthy` gate).
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/4002"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  ib-gateway-live:
    <<: *ib-gateway-base
    environment:
      - TWS_USERID=${TWS_USERID_LIVE:-${IBKR_USERNAME_LIVE:-${TWS_USERID:-${IBKR_USERNAME:-}}}}
      - TWS_PASSWORD=${TWS_PASSWORD_LIVE:-${IBKR_PASSWORD_LIVE:-${TWS_PASSWORD:-${IBKR_PASSWORD:-}}}}
      - TRADING_MODE=live
      - EXISTING_SESSION_DETECTED_ACTION=${EXISTING_SESSION_DETECTED_ACTION:-primary}
      - READ_ONLY_API=${READ_ONLY_API_LIVE:-no}
      - VNC_SERVER_PASSWORD=${VNC_SERVER_PASSWORD_LIVE:-${VNC_SERVER_PASSWORD:-}}
      - TZ=${TZ:-UTC}
      - TWO_FA_TIMEOUT_ACTION=${TWO_FA_TIMEOUT_ACTION:-restart}
    ports:
      - "127.0.0.1:5901:5900"
    # Live API binds localhost:4001 (socat re-exposes it on 4003). bash
    # /dev/tcp probe — the image has no nc (see the paper note above).
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/4001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Daemon depends_on is REDEFINED here (not merged) — Compose overlay
  # semantics: each top-level key replaces the base value, so we must
  # restate the api + openbb_sidecar dependencies alongside the new
  # ib-gateway-* health gate.
  trading_daemon_paper:
    depends_on:
      api:
        condition: service_started
      openbb_sidecar:
        condition: service_started
      ib-gateway-paper:
        condition: service_healthy

  trading_daemon_live:
    depends_on:
      api:
        condition: service_started
      openbb_sidecar:
        condition: service_started
      ib-gateway-live:
        condition: service_healthy
