# iguanatrader â€” MVP deployment profile (slice bootstrap-tenant-cli-and-mvp-deploy).
#
# Minimal two-service stack runnable on a VPS:
#
#   - `api`     FastAPI monolith (port 8000)
#   - `web`     SvelteKit adapter-node frontend (port 5173)
#
# Data persists in the named volume `iguanatrader_data` (SQLite +
# bitemporal research payloads). Bring-up sequence on a fresh VPS:
#
#   1. `docker compose -f compose/mvp.yml build`
#   2. `docker compose -f compose/mvp.yml run --rm api \
#        iguanatrader admin bootstrap-tenant <slug> \
#          --email <e> --password <p>`
#   3. `docker compose -f compose/mvp.yml up -d`
#
# Schema migrations run automatically on every container boot via the
# image's docker-entrypoint.sh (`alembic upgrade head`, idempotent).
# To opt out (e.g. before a planned downgrade), set
# `IGUANA_SKIP_MIGRATIONS=1` on the api service.
#
# Then visit http://<VPS_IP>:5173 and log in with the seeded credentials.
# Behind a reverse proxy (Caddy/nginx) you'd terminate TLS at the proxy
# and forward to `web:5173` + `api:8000` over the compose network.
#
# What this stack does NOT include (deliberately):
#   - OpenBB sidecar (AGPL isolation; only needed once you wire the
#     research adapters with real provider keys â€” see docs/getting-started.md).
#   - Litestream replication (the canonical docker-compose.yml has it).
#   - IBKR TWS/Gateway (paper/live trading; slice T4 wiring + ops setup).
#   - SOPS-encrypted env decryption (use plain env vars on the VPS; the
#     canonical .secrets/dev.env.enc pipeline is for multi-operator teams).

services:
  api:
    image: iguanatrader/api:mvp
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      - IGUANATRADER_PROFILE=mvp
      - IGUANATRADER_API_HOST=0.0.0.0
      - IGUANATRADER_API_PORT=8000
      # Single SQLite file under the named volume.
      - IGUANA_DATABASE_URL=sqlite+aiosqlite:////data/iguanatrader.db
      # Hybrid-storage payload root for research_facts.raw_payload_path.
      # MUST be absolute + writable by the container's `app` user. Without
      # this override the repository defaults to ``data/research_cache``
      # relative to cwd â€” which is /app for the container, where /app/data
      # is not writable; operator workaround was `docker exec --workdir
      # /data`. Setting it explicitly here means any cwd works.
      - IGUANATRADER_RESEARCH_CACHE_ROOT=/data/research_cache
      # MUST override before `docker compose up` in production. The
      # default below is a non-functional placeholder so the container
      # fails loudly if the operator forgets the override.
      - IGUANATRADER_JWT_SECRET=${IGUANATRADER_JWT_SECRET:-CHANGE-ME-64-CHAR-HEX}
      # Channel dispatcher (slice ``auth-forgot-password-flow`` wires
      # the dormant Telegram + Hermes adapters into the MVP profile).
      # Default ``email`` only â€” operator upgrades to
      # ``telegram_hermes_email`` once Telegram + WhatsApp creds are
      # populated. Per-channel fallback to log-only when individual
      # creds are missing (see
      # ``apps/api/src/iguanatrader/contexts/approval/dispatcher.py``).
      - IGUANATRADER_CHANNEL_DISPATCHER=${IGUANATRADER_CHANNEL_DISPATCHER:-email}
      # SMTP transport (provider-agnostic; from-address defaults to the
      # canonical brand domain â€” operator overrides per-tenant).
      - IGUANATRADER_SMTP_HOST=${IGUANATRADER_SMTP_HOST:-}
      - IGUANATRADER_SMTP_PORT=${IGUANATRADER_SMTP_PORT:-587}
      - IGUANATRADER_SMTP_USERNAME=${IGUANATRADER_SMTP_USERNAME:-}
      - IGUANATRADER_SMTP_PASSWORD=${IGUANATRADER_SMTP_PASSWORD:-}
      - IGUANATRADER_SMTP_FROM_ADDRESS=${IGUANATRADER_SMTP_FROM_ADDRESS:-iguanatrader@palafitofood.com}
      - IGUANATRADER_SMTP_FROM_NAME=${IGUANATRADER_SMTP_FROM_NAME:-iguanatrader}
      - IGUANATRADER_SMTP_USE_TLS=${IGUANATRADER_SMTP_USE_TLS:-true}
      # MCP server (Hermes / external LLM consumers). Empty token disables
      # the /api/v1/mcp/* routes (503). Token lives in
      # ``.secrets/{paper,live}.env.enc`` under ``IGUANATRADER_MCP_TOKEN``;
      # tenant slug must match the bootstrapped tenant from step 2 of the
      # MVP bring-up. Operator exports both before ``docker compose up``;
      # slice ``sops-decrypt-at-boot`` will replace the manual export.
      - IGUANATRADER_MCP_TOKEN=${IGUANATRADER_MCP_TOKEN:-}
      - IGUANATRADER_MCP_TENANT_SLUG=${IGUANATRADER_MCP_TENANT_SLUG:-}
      # Telegram bot (optional â€” empty disables that channel).
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Hermes/WhatsApp (optional â€” empty disables that channel).
      # NB: the SOPS .secrets/*.enc bundles still carry the legacy
      # HERMES_WEBHOOK_URL + HERMES_AUTH_TOKEN names from ELIGIA â€” rename
      # to HERMES_BASE_URL + HERMES_HMAC_SECRET when migrating, see
      # docs/mvp-deploy.md Step 2.
      - HERMES_BASE_URL=${HERMES_BASE_URL:-}
      - HERMES_HMAC_SECRET=${HERMES_HMAC_SECRET:-}
      # Profile gate: research + proposal-advisor + journaling route
      # builders flip to ``AnthropicLLMClient`` only when this env in
      # {paper, live, production} AND ``ANTHROPIC_API_KEY`` is set;
      # otherwise they fall through to ``FakeLLMClient``. Slice
      # ``llm-observability-and-signals`` (PR #194).
      - IGUANATRADER_ENV=${IGUANATRADER_ENV:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Langfuse SaaS â€” cross-stack LLM observability shared with the
      # ELIGIA dashboard. Empty values disable export (no-op fallback);
      # populated values enable per-call generation spans tagged
      # ``consumer=iguanatrader`` + ``application=iguanatrader-<module>``.
      # Per ADR-018.
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      # Research data-source credentials (Ingestion Wave I0+). Empty
      # values disable the corresponding adapter â€” the CLI raises a
      # ConfigError at init when its required env is unset. See
      # docs/runbooks/research-data-sources.md for registration links.
      - SEC_EDGAR_USER_AGENT=${SEC_EDGAR_USER_AGENT:-}
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - BEA_API_KEY=${BEA_API_KEY:-}
      - BLS_API_KEY=${BLS_API_KEY:-}
      - OPENFDA_API_KEY=${OPENFDA_API_KEY:-}
      # OpenBB sidecar (Ingestion Wave I2). Service DNS resolves via
      # the compose network; the sidecar's port 8765 is NOT exposed to
      # the host (AGPL boundary + ops simplicity).
      - OPENBB_SIDECAR_URL=${OPENBB_SIDECAR_URL:-http://openbb_sidecar:8765}
      - OPENBB_SIDECAR_ENABLED=${OPENBB_SIDECAR_ENABLED:-true}
    volumes:
      - iguanatrader_data:/data
    ports:
      - "8000:8000"

  # Trading daemons â€” slice ``dual-daemon-mode-toggle-and-reconcile``.
  #
  # Each daemon process runs ONE mode (paper or live) end-to-end:
  # APScheduler cron jobs for proposals + heartbeat, bus subscriptions
  # for drain + reconcile, and a single IB Gateway sidecar connection.
  #
  # Live defaults to enabled=false on first migration (seeded by
  # ``0026_tenant_trading_modes``). The container boots either way; the
  # ``trading_enabled`` flag gates every propose tick â€” a disabled
  # daemon idles, heartbeats, but emits no proposals + orders.
  #
  # Both daemons share ``iguanatrader_data`` (research_facts ingestion
  # + DB write paths are mode-scoped via tenant_id + mode). Migrations
  # are skipped (``IGUANA_SKIP_MIGRATIONS=1``); the ``api`` container
  # owns alembic on boot.
  #
  # SCHEDULER_ONLY is per-daemon: VPS deployments where the IB Gateway
  # is unreachable (typical: TWS lives on the operator's laptop) set
  # the flag to ``true`` to skip broker construction. Set to ``false``
  # when running locally with TWS.

  trading_daemon_paper:
    image: iguanatrader/api:mvp
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    command: ["iguanatrader", "trading", "run", "--mode=paper"]
    environment:
      - IGUANATRADER_PROFILE=mvp
      - IGUANA_DATABASE_URL=sqlite+aiosqlite:////data/iguanatrader.db
      # APScheduler jobstore in a sibling sqlite (per-mode so paper +
      # live cron history do not contend).
      - DATABASE_PATH=/data/iguanatrader_scheduler_paper.db
      - IGUANATRADER_RESEARCH_CACHE_ROOT=/data/research_cache
      - IGUANA_SKIP_MIGRATIONS=1
      - IGUANATRADER_DAEMON_SCHEDULER_ONLY=${IGUANATRADER_DAEMON_PAPER_SCHEDULER_ONLY:-true}
      - IGUANATRADER_ENV=${IGUANATRADER_ENV:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - SEC_EDGAR_USER_AGENT=${SEC_EDGAR_USER_AGENT:-}
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - BEA_API_KEY=${BEA_API_KEY:-}
      - BLS_API_KEY=${BLS_API_KEY:-}
      - OPENFDA_API_KEY=${OPENFDA_API_KEY:-}
      - ENABLE_FOOL_SCRAPER=${ENABLE_FOOL_SCRAPER:-false}
      - OPENBB_SIDECAR_URL=${OPENBB_SIDECAR_URL:-http://openbb_sidecar:8765}
      - OPENBB_SIDECAR_ENABLED=${OPENBB_SIDECAR_ENABLED:-true}
      # IB Gateway connection â€” paper side. Defaults match the
      # ib-gateway-paper service name + the socat-exposed API port from
      # the compose/ibgateway.yml overlay. gnzsnz/ib-gateway binds the
      # Java API to localhost:4002 and re-exposes it on the container
      # network via socat at 4004 (paper) â€” sibling containers MUST use
      # 4004; :4002 is loopback-only and times out from another container.
      - IBKR_HOST=${IBKR_HOST_PAPER:-ib-gateway-paper}
      - IBKR_PORT=${IBKR_PORT_PAPER:-4004}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID_PAPER:-1}
      - IBKR_USERNAME=${IBKR_USERNAME:-${TWS_USERID:-}}
      - IBKR_PASSWORD=${IBKR_PASSWORD:-${TWS_PASSWORD:-}}
    volumes:
      - iguanatrader_data:/data
    depends_on:
      - api
      - openbb_sidecar

  trading_daemon_live:
    image: iguanatrader/api:mvp
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    command: ["iguanatrader", "trading", "run", "--mode=live"]
    environment:
      - IGUANATRADER_PROFILE=mvp
      - IGUANA_DATABASE_URL=sqlite+aiosqlite:////data/iguanatrader.db
      - DATABASE_PATH=/data/iguanatrader_scheduler_live.db
      - IGUANATRADER_RESEARCH_CACHE_ROOT=/data/research_cache
      - IGUANA_SKIP_MIGRATIONS=1
      - IGUANATRADER_DAEMON_SCHEDULER_ONLY=${IGUANATRADER_DAEMON_LIVE_SCHEDULER_ONLY:-true}
      - IGUANATRADER_ENV=${IGUANATRADER_ENV:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - SEC_EDGAR_USER_AGENT=${SEC_EDGAR_USER_AGENT:-}
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - BEA_API_KEY=${BEA_API_KEY:-}
      - BLS_API_KEY=${BLS_API_KEY:-}
      - OPENFDA_API_KEY=${OPENFDA_API_KEY:-}
      - ENABLE_FOOL_SCRAPER=${ENABLE_FOOL_SCRAPER:-false}
      - OPENBB_SIDECAR_URL=${OPENBB_SIDECAR_URL:-http://openbb_sidecar:8765}
      - OPENBB_SIDECAR_ENABLED=${OPENBB_SIDECAR_ENABLED:-true}
      # IB Gateway connection â€” live side. SOPS-managed credentials
      # land in IBKR_USERNAME_LIVE / IBKR_PASSWORD_LIVE per the
      # .secrets/live.env.enc convention (operator populates before
      # flipping the live daemon enabled=true via the /settings UI).
      # Port 4003 is the socat-exposed live API (gateway binds
      # localhost:4001 internally â€” see the paper-side note above).
      - IBKR_HOST=${IBKR_HOST_LIVE:-ib-gateway-live}
      - IBKR_PORT=${IBKR_PORT_LIVE:-4003}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID_LIVE:-2}
      - IBKR_USERNAME=${IBKR_USERNAME_LIVE:-${TWS_USERID_LIVE:-}}
      - IBKR_PASSWORD=${IBKR_PASSWORD_LIVE:-${TWS_PASSWORD_LIVE:-}}
    volumes:
      - iguanatrader_data:/data
    depends_on:
      - api
      - openbb_sidecar

  web:
    image: iguanatrader/web:mvp
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=5173
      # SvelteKit form actions, page-server load fns, and the catch-all
      # `/api/v1/[...path]/+server.ts` proxy hit the API at this URL.
      # Inside the compose network, `api` resolves via Docker DNS.
      - IGUANATRADER_API_BASE_URL=http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

  # OpenBB Platform sidecar (Ingestion Wave I2 / ADR-015). AGPL-isolated:
  # the iguanatrader monolith never imports openbb at the Python level;
  # communicates via HTTP on the internal compose network only. Default
  # provider is YFinance (free, no key); operators upgrade by passing
  # OPENBB_<PROVIDER>_API_KEY env vars (FMP / Polygon / Intrinio /
  # Alpha Vantage) through this service. See docs/roadmap-ingestion.md
  # Â§"Future paid options" for the spend-decision principle.
  openbb_sidecar:
    image: iguanatrader/openbb-sidecar:mvp
    build:
      context: ./apps/openbb-sidecar
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      - OPENBB_SIDECAR_HOST=0.0.0.0
      - OPENBB_SIDECAR_PORT=8765
      - OPENBB_SIDECAR_LOG_LEVEL=${OPENBB_SIDECAR_LOG_LEVEL:-INFO}
      # Premium provider keys â€” empty by default (YFinance free path).
      # Populate to upgrade per roadmap-ingestion.md Â§"Future paid options".
      - OPENBB_FMP_API_KEY=${OPENBB_FMP_API_KEY:-}
      - OPENBB_POLYGON_API_KEY=${OPENBB_POLYGON_API_KEY:-}
      - OPENBB_INTRINIO_API_KEY=${OPENBB_INTRINIO_API_KEY:-}
      - OPENBB_ALPHA_VANTAGE_API_KEY=${OPENBB_ALPHA_VANTAGE_API_KEY:-}

volumes:
  iguanatrader_data:
