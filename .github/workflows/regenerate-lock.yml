name: Regenerate poetry.lock

# Manual trigger or path-filter trigger. Use when pyproject.toml has been
# modified locally without a working poetry available to regenerate the lock.
# Workflow resolves dependencies on the runner per matrix entry and commits
# the updated lock back.
#
# Matrix: each consumer pyproject.toml has its own working-dir + Python
# version. Add new entries when a new app subpath ships its own
# pyproject.toml (e.g. apps/<name>/pyproject.toml). The Python version per
# entry MUST match the interpreter the lock is actually consumed on, so the
# resolved lock can't drift from runtime/CI. The root resolves on 3.11 —
# matching pyproject `requires-python = ">=3.11"`, the runtime Dockerfile
# (ARG PYTHON_VERSION=3.11), mypy (python_version = "3.11"), and every ci.yml
# job (python-version: '3.11'). openbb-sidecar pins <3.13 due to openbb-equity.

on:
  workflow_dispatch:
  push:
    branches:
      - "slice/**"
      - "chore/**"
      - "fix/**"
      - "feat/**"
    paths:
      - "pyproject.toml"
      - "apps/openbb-sidecar/pyproject.toml"
      - ".github/workflows/regenerate-lock.yml"

permissions:
  contents: write

jobs:
  regenerate-lock:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - working-directory: "."
            python-version: "3.11"
            label: "root"
          - working-directory: "apps/openbb-sidecar"
            python-version: "3.12"
            label: "openbb-sidecar"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install poetry
        run: pip install poetry

      - name: Regenerate lock for ${{ matrix.label }}
        working-directory: ${{ matrix.working-directory }}
        run: poetry lock --no-cache

      - name: Commit + push lock if changed (${{ matrix.label }})
        run: |
          set -e
          # Pull latest in case a sibling matrix job committed (avoid non-fast-forward).
          git fetch origin "${GITHUB_REF#refs/heads/}"
          git reset --hard "origin/${GITHUB_REF#refs/heads/}"
          # Re-run lock against the freshly-pulled state.
          (cd "${WORKDIR}" && poetry lock --no-cache)
          # Stage the lock — this catches BOTH new (untracked) files and modifications.
          # Earlier version used `git diff --quiet` which silently passed on untracked
          # files (the bug that left openbb-sidecar/poetry.lock unborn on first run).
          git add "${WORKDIR}/poetry.lock"
          if ! git diff --cached --quiet -- "${WORKDIR}/poetry.lock"; then
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git commit -m "chore(deps): regenerate ${LABEL} poetry.lock to match pyproject.toml"
            # Retry push up to 3 times in case sibling matrix job races.
            for i in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin "${GITHUB_REF#refs/heads/}"
              git rebase "origin/${GITHUB_REF#refs/heads/}"
            done
            echo "::error::Failed to push after 3 retries"
            exit 1
          else
            echo "${LABEL} poetry.lock already in sync — no changes."
          fi
        env:
          WORKDIR: ${{ matrix.working-directory }}
          LABEL: ${{ matrix.label }}
