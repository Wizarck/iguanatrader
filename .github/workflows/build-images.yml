name: Build Docker images

on:
  push:
    tags:
      - 'v*.*.*'
    branches: [main]
    paths:
      - 'apps/api/Dockerfile'
      - 'apps/web/Dockerfile'
      - 'docker-compose*.yml'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'apps/web/package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/Dockerfile'
      - 'apps/web/Dockerfile'
      - 'docker-compose*.yml'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'apps/web/package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  config-validation:
    name: docker compose config (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose YAML shape
        run: |
          docker compose -f compose/mvp.yml config --quiet
          docker compose -f compose/postgres.yml config --quiet
          docker compose -f compose/ibgateway.yml config --quiet
          docker compose -f compose/backup.yml -f compose/postgres.yml config --quiet

  build-mvp-api:
    name: docker build apps/api/Dockerfile
    runs-on: ubuntu-latest
    needs: config-validation
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build api (runtime stage)
        run: |
          docker build -f apps/api/Dockerfile --target runtime -t iguanatrader/api:mvp .

  build-mvp-web:
    name: docker build apps/web/Dockerfile
    runs-on: ubuntu-latest
    needs: config-validation
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build web (runtime stage)
        run: |
          docker build -f apps/web/Dockerfile --target runtime -t iguanatrader/web:mvp .
