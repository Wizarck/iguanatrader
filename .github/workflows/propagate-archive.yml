# =============================================================================
# propagate-archive.yml — Post-merge OpenSpec archive automation
# =============================================================================
# Per release-management.md §6.7. Fires when a slice/<change-id> PR
# squash-merges to main. Runs `openspec archive --change <change-id>`
# on a fresh clone, opens a chore-archive PR with auto-merge enabled.
#
# Auto-generated PR body includes §4.5 markers per release-management.md
# §4.5.4 so the L2 ai-self-review-required check passes without manual
# body edits.
#
# Materialise: copy this file to .github/workflows/propagate-archive.yml
# Required secrets: GITHUB_TOKEN (default repo token; needs PR write
# permission). For repos using auto-merge: ensure repo settings have
# `allow_auto_merge: true` (per release-management.md §5.6 Profile A).
# =============================================================================

name: propagate-archive

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  archive-on-merge:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'slice/')
    runs-on: ubuntu-latest
    steps:
      - name: Extract change-id from head ref
        id: extract
        run: |
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          CHANGE_ID="${HEAD_REF#slice/}"
          # Strip any --<group> suffix (per §6.6 intra-slice subagent branches).
          CHANGE_ID="${CHANGE_ID%%--*}"
          echo "change_id=$CHANGE_ID" >> "$GITHUB_OUTPUT"
          echo "Extracted change-id: $CHANGE_ID"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify change folder still active
        id: verify
        run: |
          CHANGE_ID="${{ steps.extract.outputs.change_id }}"
          if [ ! -d "openspec/changes/$CHANGE_ID" ]; then
            echo "::notice::openspec/changes/$CHANGE_ID already archived (or never existed). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.verify.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install openspec CLI
        if: steps.verify.outputs.skip != 'true'
        run: |
          pip install openspec || {
            echo "::warning::openspec PyPI install failed; trying npm fallback"
            npm install -g @openspec/cli
          }

      - name: Run archive
        if: steps.verify.outputs.skip != 'true'
        run: |
          CHANGE_ID="${{ steps.extract.outputs.change_id }}"
          # The archive skill performs: mv openspec/changes/$CHANGE_ID
          # openspec/changes/archive/$(date +%Y-%m-%d)-$CHANGE_ID/
          # + writes retros/$CHANGE_ID.md stub if it does not exist yet.
          mkdir -p openspec/changes/archive retros
          ARCHIVE_DATE=$(date -u +%Y-%m-%d)
          ARCHIVE_DEST="openspec/changes/archive/${ARCHIVE_DATE}-${CHANGE_ID}"
          if [ -d "$ARCHIVE_DEST" ]; then
            echo "::warning::$ARCHIVE_DEST already exists; appending -auto suffix to avoid clobber"
            ARCHIVE_DEST="${ARCHIVE_DEST}-auto"
          fi
          git mv "openspec/changes/$CHANGE_ID" "$ARCHIVE_DEST"
          if [ ! -f "retros/$CHANGE_ID.md" ]; then
            cat > "retros/$CHANGE_ID.md" <<RETRO_EOF
# Retrospective: $CHANGE_ID

- **Archived**: $ARCHIVE_DATE
- **Archive path**: $ARCHIVE_DEST/
- **Squash SHA**: ${{ github.event.pull_request.merge_commit_sha }}

## What worked

<one paragraph; fill in post-merge>

## What didn't

<one paragraph; fill in post-merge>

## Lessons

<bulleted; durable across slices>

## Carry-forward to next change

<bulleted; action items, follow-up tickets, spec edits>
RETRO_EOF
          fi

      - name: Create archive PR
        if: steps.verify.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGE_ID="${{ steps.extract.outputs.change_id }}"
          BRANCH="chore/archive-$CHANGE_ID"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add openspec/changes/ retros/
          git commit -m "chore(archive): $CHANGE_ID — post-merge archive

Auto-generated by propagate-archive.yml in response to PR #${{ github.event.pull_request.number }} (slice/$CHANGE_ID) squash-merging to main.

Refs release-management.md §6.7."
          git push origin "$BRANCH"
          # PR body includes §4.5 markers per release-management.md §4.5.4
          # so the ai-self-review-required check passes.
          gh pr create \
            --title "chore(archive): $CHANGE_ID — post-merge archive" \
            --body "$(cat <<BODY_EOF
## Summary

Auto-archive of slice \`$CHANGE_ID\` after PR #${{ github.event.pull_request.number }} squash-merged to main.

- Moved \`openspec/changes/$CHANGE_ID/\` → \`openspec/changes/archive/$(date -u +%Y-%m-%d)-$CHANGE_ID/\`
- Wrote retro stub at \`retros/$CHANGE_ID.md\` (if not pre-existing)

## Test plan

Mechanical move + stub write. No code changes. Reviewer verifies the move target and stub exist.

## AI-reviewer signoff

- **Profile**: B (automated PR; no worker-AI session)
- **Reviewer**: self-review (mechanical archive; no semantic diff)
- **Self-review findings**: none — diff is mechanically generated by propagate-archive.yml. Review is limited to verifying the archive path and retro-stub presence match the source PR (#${{ github.event.pull_request.number }}).

## References

- Trigger: PR #${{ github.event.pull_request.number }}
- Spec: release-management.md §6.7
BODY_EOF
)" \
            --base main \
            --head "$BRANCH"
          # Enable auto-merge so the chore PR doesn't sit unattended.
          # Requires Profile A (allow_auto_merge=true at repo level).
          gh pr merge --auto --squash || echo "::notice::auto-merge unavailable; PR opened without auto-merge"
