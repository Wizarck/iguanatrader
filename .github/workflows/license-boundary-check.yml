name: License boundary check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Recorded canonical sha256 hashes (sourced 2026-04-30):
# - Apache-2.0:    https://www.apache.org/licenses/LICENSE-2.0.txt
# - Commons Clause v1.0:  https://commonsclause.com/
#
# Tampering with LICENSE (or these constants) will fail this workflow.
env:
  LICENSE_APACHE2_SHA256: ${{ vars.LICENSE_APACHE2_SHA256 }}
  LICENSE_COMMONS_CLAUSE_SHA256: ${{ vars.LICENSE_COMMONS_CLAUSE_SHA256 }}

jobs:
  checksum:
    name: Verify LICENSE checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify LICENSE exists
        run: |
          test -f LICENSE || { echo "::error::LICENSE missing"; exit 1; }
      # The full LICENSE is concatenation of Apache-2.0 + delimiter + Commons
      # Clause v1.0. Slice 1 records the segment hashes via repo Variables;
      # this step splits the file at the delimiter and verifies each half.
      - name: Verify segment checksums
        if: ${{ env.LICENSE_APACHE2_SHA256 != '' && env.LICENSE_COMMONS_CLAUSE_SHA256 != '' }}
        run: |
          set -euo pipefail
          delimiter="--- COMMONS CLAUSE v1.0 ---"
          # Split LICENSE at delimiter
          awk -v d="$delimiter" '
            BEGIN { section=1 }
            $0 ~ d { section=2; next }
            { print > ("/tmp/license-segment-" section ".txt") }
          ' LICENSE
          actual_apache=$(sha256sum /tmp/license-segment-1.txt | awk '{print $1}')
          actual_clause=$(sha256sum /tmp/license-segment-2.txt | awk '{print $1}')
          echo "Apache segment sha256: $actual_apache"
          echo "Clause segment sha256: $actual_clause"
          if [[ "$actual_apache" != "$LICENSE_APACHE2_SHA256" ]]; then
            echo "::error::Apache-2.0 segment checksum mismatch (expected $LICENSE_APACHE2_SHA256, got $actual_apache)"
            exit 1
          fi
          if [[ "$actual_clause" != "$LICENSE_COMMONS_CLAUSE_SHA256" ]]; then
            echo "::error::Commons Clause segment checksum mismatch (expected $LICENSE_COMMONS_CLAUSE_SHA256, got $actual_clause)"
            exit 1
          fi
          echo "::notice::Both LICENSE segments match canonical sha256 constants"
      - name: Skip when constants not yet recorded
        if: ${{ env.LICENSE_APACHE2_SHA256 == '' || env.LICENSE_COMMONS_CLAUSE_SHA256 == '' }}
        run: |
          echo "::notice::n/a — LICENSE_APACHE2_SHA256 or LICENSE_COMMONS_CLAUSE_SHA256 vars not yet set (slice 1 final-verification step records them)"

  agpl-boundary:
    name: AGPL boundary check (apps/api/ vs apps/openbb-sidecar/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Three independent surface checks (per slice R4 design D4). Each
      # surface MUST be clean for the gate to pass. They do not overlap
      # — covering different leakage paths:
      #   1. declared dep in pyproject.toml → catches `poetry add openbb`
      #   2. resolved dep in poetry.lock → catches transitive AGPL drag-in
      #   3. import statement in source → catches a hand-edit that
      #      bypasses the dep manager
      # Failure of any one prints `::error::` + non-zero exit.
      #
      # The gate also asserts that yfinance is NOT a direct dep — the
      # canonical access path is through the sidecar (R4 design D7).
      # An explicit `pip install yfinance` in apps/api would defeat the
      # license boundary even though yfinance is Apache-2.0, because the
      # whole point of the sidecar is keeping the openbb provider chain
      # behind the HTTP boundary.

      - name: Surface 1 — no AGPL/yfinance declared in apps/api/pyproject.toml
        run: |
          set -euo pipefail
          target="apps/api/pyproject.toml"
          if [[ ! -f "$target" ]]; then
            echo "::warning::$target not present yet — skipping declared-dep check"
            exit 0
          fi
          if grep -iE '^\s*openbb' "$target"; then
            echo "::error::$target declares an AGPL dependency (openbb*)."
            echo "AGPL packages must live in apps/openbb-sidecar/ only; the monolith"
            echo "must reach openbb exclusively over HTTP via the sidecar Service."
            exit 1
          fi
          if grep -iE '^\s*yfinance' "$target"; then
            echo "::error::$target declares yfinance as a direct dep."
            echo "Per slice R4 design D7, yfinance access goes through the sidecar"
            echo "via YFinanceProxySource. Do NOT add yfinance as an apps/api dep."
            exit 1
          fi
          echo "✓ apps/api/pyproject.toml surface clean."

      - name: Surface 2 — no AGPL packages resolved in apps/api/poetry.lock
        run: |
          set -euo pipefail
          target="apps/api/poetry.lock"
          if [[ ! -f "$target" ]]; then
            echo "::warning::$target not present yet — skipping resolved-dep check"
            exit 0
          fi
          if grep -iE '^name = "openbb' "$target"; then
            echo "::error::$target resolves to AGPL openbb package(s)."
            echo "Likely cause: a transitive dependency drags openbb in. Inspect"
            echo "the lock for the transitive chain and pin it out, or relocate"
            echo "the consumer to apps/openbb-sidecar."
            exit 1
          fi
          echo "✓ apps/api/poetry.lock surface clean."

      - name: Surface 3 — no openbb imports in apps/api/src/ or packages/
        run: |
          set -euo pipefail
          # Use grep -RnE rather than ripgrep (rg may not be present on the runner).
          if grep -RnE '^(from|import)\s+openbb(\.|$|\s)' apps/api/src/ packages/ 2>/dev/null; then
            echo "::error::Found openbb imports in apps/api/src/ or packages/."
            echo "The monolith must NEVER import openbb directly. Use the"
            echo "OpenBBSidecarSource HTTP adapter at"
            echo "apps/api/src/iguanatrader/contexts/research/sources/openbb_sidecar.py"
            echo "instead."
            exit 1
          fi
          # yfinance import surface check (same rationale as pyproject yfinance check)
          if grep -RnE '^(from|import)\s+yfinance(\.|$|\s)' apps/api/src/ packages/ 2>/dev/null; then
            echo "::error::Found yfinance imports in apps/api/src/ or packages/."
            echo "yfinance access goes through YFinanceProxySource → sidecar."
            exit 1
          fi
          echo "✓ apps/api/src/ + packages/ import surface clean."

      - name: Notice — AGPL gate green
        run: |
          echo "::notice::AGPL boundary intact across all three surfaces (declared, resolved, imported)."
