name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install deps
        # `package-mode = false` + only a `dev` group declared, so the implicit
        # "main" group does not exist. Until slice 2 lands runtime deps, install
        # only the dev group explicitly.
        run: poetry install --no-interaction --only=dev
      - name: ruff check
        run: poetry run ruff check .
      - name: black --check
        run: poetry run black --check .

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install deps
        run: poetry install --no-interaction --only=dev
      - name: Detect Python sources
        id: detect
        # Slice 1 has no application source under apps/ or packages/. Slice 2
        # (shared-primitives) lands the first .py files. Until then mypy has
        # nothing to type-check; running it would fail with "no files".
        run: |
          if find apps packages -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
      - name: mypy --strict
        if: steps.detect.outputs.has_py == 'true'
        run: poetry run mypy .
      - name: Skip notice (no Python sources yet)
        if: steps.detect.outputs.has_py == 'false'
        run: |
          echo "Slice 1 - no Python sources under apps/ or packages/."
          echo "Skipping mypy until slice 2 lands runtime source."

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install deps
        run: poetry install --no-interaction --only=dev
      - name: Detect Python sources
        id: detect
        run: |
          if find apps packages -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
      - name: pytest
        if: steps.detect.outputs.has_py == 'true'
        run: poetry run pytest --collect-only
      - name: Skip notice (no Python sources yet)
        if: steps.detect.outputs.has_py == 'false'
        run: |
          echo "Slice 1 - no Python sources under apps/ or packages/."
          echo "Skipping pytest until slice 2 lands runtime source."

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Poetry + pre-commit
        run: |
          pip install poetry pre-commit
          poetry install --no-interaction --only=dev
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
