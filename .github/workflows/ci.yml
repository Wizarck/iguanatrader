name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install deps
        # `package-mode = false` + only a `dev` group declared, so the implicit
        # "main" group does not exist. Until slice 2 lands runtime deps, install
        # only the dev group explicitly.
        run: poetry install --no-interaction --with dev
      - name: ruff check
        run: poetry run ruff check .
      - name: black --check
        run: poetry run black --check .

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install deps
        run: poetry install --no-interaction --with dev
      - name: Detect Python sources
        id: detect
        # Slice 1 has no application source under apps/ or packages/. Slice 2
        # (shared-primitives) lands the first .py files. Until then mypy has
        # nothing to type-check; running it would fail with "no files".
        run: |
          if find apps packages -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
      - name: mypy --strict
        if: steps.detect.outputs.has_py == 'true'
        run: poetry run mypy .
      - name: Skip notice (no Python sources yet)
        if: steps.detect.outputs.has_py == 'false'
        run: |
          echo "Slice 1 - no Python sources under apps/ or packages/."
          echo "Skipping mypy until slice 2 lands runtime source."

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install deps
        run: poetry install --no-interaction --with dev
      - name: Detect Python sources
        id: detect
        run: |
          if find apps packages -name '*.py' 2>/dev/null | grep -q .; then
            echo "has_py=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_py=false" >> "$GITHUB_OUTPUT"
          fi
      - name: pytest
        if: steps.detect.outputs.has_py == 'true'
        run: poetry run pytest --collect-only
      - name: Skip notice (no Python sources yet)
        if: steps.detect.outputs.has_py == 'false'
        run: |
          echo "Slice 1 - no Python sources under apps/ or packages/."
          echo "Skipping pytest until slice 2 lands runtime source."

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Playbook integration hooks (schema-validate-agents, mcp-validate)
          # invoke python scripts under .ai-playbook/, which is a submodule
          # pointing at the private repo Wizarck/ai-playbook (+ eligia-skills
          # under .skills-sources/). The default GITHUB_TOKEN is scoped to
          # this repo only, so cross-repo clone needs a PAT with Contents:R
          # on the playbook + skills repos. Stored as repo secret.
          submodules: true
          token: ${{ secrets.ELIGIA_GOD_MODE }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Poetry + pre-commit + playbook hook deps
        # `jsonschema` + `pyyaml` are imported by .ai-playbook/scripts/
        # schema_validate.py (system-language pre-commit hook); without them
        # schema-validate-agents exits with WHY=missing-dep.
        run: |
          pip install poetry pre-commit jsonschema pyyaml
          poetry install --no-interaction --with dev
      - name: Run pre-commit
        # Skip mcp-validate in CI: the hook re-renders mcp-servers from the
        # 3-layer SSOT (base + project + personal) and compares against the
        # committed .mcp.json. CI has no personal layer (~/.config/mcp-
        # servers.yaml) so the render diverges by design. The hook still
        # runs locally on every commit by individual developers.
        #
        # PYTHONPATH=.ai-playbook is needed because schema_validate.py does
        # `from scripts._break_glass import ...` which assumes the playbook
        # root is on sys.path. On developer machines that's true thanks to
        # `pip install -e .ai-playbook`; CI doesn't have that, so prepend
        # the path explicitly. (Documented in docs/gotchas.md.)
        #
        # Run on the diff vs base ref instead of --all-files so we only
        # check what THIS PR changes. --all-files re-flags legacy issues in
        # main (trailing whitespace, missing trailing newlines, etc.) that
        # predate the hook config — false positives that block PRs without
        # any actionable signal. block-manual-spec-edit also fails on
        # --all-files because it cannot distinguish "file exists at path"
        # from "file was modified by this commit"; with diff mode, only
        # actually-changed files are checked. (Gotcha #11.)
        env:
          SKIP: mcp-validate
          PYTHONPATH: ${{ github.workspace }}/.ai-playbook
        run: |
          if [ -n "$GITHUB_BASE_REF" ]; then
            # Pull-request event: check only files changed vs the base.
            git fetch origin "$GITHUB_BASE_REF" --depth=1
            pre-commit run \
              --from-ref "origin/$GITHUB_BASE_REF" \
              --to-ref HEAD \
              --show-diff-on-failure
          else
            # Push event (main, after merge): check the latest commit only.
            pre-commit run \
              --from-ref HEAD~1 \
              --to-ref HEAD \
              --show-diff-on-failure
          fi
