# Pre-commit config for iguanatrader. Inherits hooks from the ai-playbook submodule.
# Bootstrap: `pip install pre-commit && pre-commit install` after cloning.
#
# Two hooks are OPTIONAL and commented out below. Enable them only if the
# project meets the activation condition stated above each block. See
# .ai-playbook/specs/fusion-integration-pattern.md §8 for guidance on
# tailoring this template for projects with a pre-existing OpenSpec custom
# workflow.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # --unsafe: syntax-only check (still catches malformed YAML) without
        # constructing tag objects, so Docker Compose merge tags (`!override`,
        # `!reset` — used in compose/ibgateway-ephemeral-live.yml to drop a
        # merged depends_on gate) don't trip PyYAML's SafeLoader
        # ("could not determine a constructor for the tag '!override'").
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: schema-validate-agents
        name: Validate AGENTS.md against playbook schema
        entry: python .ai-playbook/scripts/schema_validate.py AGENTS.md
        language: system
        pass_filenames: false
        files: ^AGENTS\.md$

      - id: mcp-validate
        name: Validate mcp-servers.yaml layering
        entry: python .ai-playbook/scripts/mcp/validate.py
        language: system
        pass_filenames: false
        files: ^mcp-servers\.yaml$|^mcp-servers\.project\.yaml$

      - id: verdict-lint
        name: Lint review/verify verdict shape (verdict-contract.md)
        entry: python .ai-playbook/scripts/verdict_lint.py --shape artifact
        language: system
        files: ^openspec/changes/.*/(review|verify)\.md$

      # OPTIONAL — enable only if this project archives OpenSpec changes into
      # openspec/specs/ via the archive workflow. Projects using a custom
      # workflow that does NOT promote specs post-archive (e.g. consumer-a's
      # consumer-a-team schema) should leave this disabled. See AGENTS.md §7.5.
      # - id: block-manual-spec-edit
      #   name: Block manual edits to openspec/specs/
      #   entry: python .ai-playbook/scripts/block_manual_spec_edit.py
      #   language: system
      #   files: ^openspec/specs/.*\.md$

      # OPTIONAL — enable only if this project calls LLMs directly from code
      # (e.g. via anthropic / openai SDKs in production paths). Projects that
      # do NOT call LLMs directly (e.g. backend-only data sync services)
      # should leave this disabled. See AGENTS.md §7.5.
      # - id: verify-llm-routing
      #   name: Verify LLM routing (Change C drift detector — direct-SDK callers)
      #   entry: python .ai-playbook/scripts/verify_llm_routing.py
      #   language: system
      #   pass_filenames: false
      #   # Warn-only initially per ai-playbook D3.5; promote to --strict after
      #   # 30 days of green builds. Migrate offending callers to
      #   # `.ai-playbook.scripts._llm.call(task_class, ...)` — see
      #   # `.ai-playbook/specs/model-routing.md` §1 for the task-class taxonomy.
      #   always_run: true
